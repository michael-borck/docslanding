# Documentation Theme Configuration Template
# Copy this to your project and customize as needed

# Site settings - CUSTOMIZE THESE
title: Your Project Name
description: Your project description here
baseurl: "/your-repo-name"  # Change to your repository name
url: "https://your-username.github.io"  # Change to your GitHub username

# Author information - CUSTOMIZE
author:
  name: Your Name
  email: your-email@example.com

# GitHub repository information - CUSTOMIZE
github_username: your-username
repository: your-repo-name

# Theme configuration (DO NOT CHANGE)
# remote_theme: your-username/your-theme-name  # Uncomment when theme is published

# Landing page navigation - CUSTOMIZE AS NEEDED (used on homepage header)
landing_navigation:
  - text: "Features"
    url: "#features"
  - text: "Installation"
    url: "#installation"
  - text: "Documentation"
    url: "/docs/"

# Header button (top-right) - CUSTOMIZE
header_button:
  text: "GitHub"
  url: "https://github.com/your-username/your-repo-name"

# Auto-generate docs navigation from collections
auto_docs_navigation: true

# Markdown processing
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-relative-links

# Navigation structure - CUSTOMIZE AS NEEDED
header_pages:
  - index.md
  - docs/getting-started/index.md
  - docs/user-guide/index.md
  - docs/features/index.md
  - docs/tutorials/index.md
  - docs/troubleshooting/index.md
  - docs/reference/index.md

# Site settings
show_excerpts: false

# Build settings
safe: true
incremental: false

# Collections for better organization - CUSTOMIZE AS NEEDED
collections:
  docs:
    output: true
    permalink: /docs/:path/

# Exclude files from processing
exclude:
  - vendor/
  - .bundle/
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - temp-theme/  # Add this if theme folder exists in same repo

# Include files that start with underscores
include:
  - _config.yml

# SEO and social - CUSTOMIZE
twitter:
  username: # Add your Twitter username if desired
  card: summary

logo: /assets/icon-512x512.png  # Add your logo path

# Google Analytics - UNCOMMENT AND ADD ID IF DESIRED
# google_analytics: GA_TRACKING_ID

# Social links - CUSTOMIZE
social:
  name: Your Project Name
  links:
    - https://github.com/your-username/your-repo-name